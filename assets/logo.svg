<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Waken logo">
  <title>Waken</title>
  <style>
    .wk-hub { fill: #4C6FFF; }
    .wk-spark { fill: #4C6FFF; }
    .wk-ring { stroke: #4C6FFF; fill: none; }
    @media (prefers-color-scheme: dark) {
      .wk-hub { fill: #8FA6FF; }
      .wk-spark { fill: #8FA6FF; }
      .wk-ring { stroke: #8FA6FF; }
    }
  </style>

  <!-- second, quieter pulse -->
  <circle class="wk-ring" cx="100" cy="100" r="62" stroke-width="3" opacity="0.14"/>

  <!-- wake pulse: breaking outward, not circling in place -->
  <g transform="rotate(-40 100 100)">
    <circle class="wk-ring" cx="100" cy="100" r="42" stroke-width="6" stroke-dasharray="205 60"/>
    <circle class="wk-spark" cx="160" cy="100" r="6"/>
  </g>

  <!-- hub: the Runtime, waking up -->
  <circle class="wk-hub" cx="100" cy="100" r="18"/>
</svg>
